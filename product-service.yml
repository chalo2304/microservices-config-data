spring:
  threads:
    virtual:
      enabled: true
  data:
    mongodb:
      # Sintaxis: ${NOMBRE_VAR_ENTORNO : VALOR_POR_DEFECTO}
      host: localhost
      port: 27017
      database: product-db
      username: root
      password: password
      authentication-database: admin
eureka:
  client:
    service:url:
      defaultZone: http://localhost:8761/eureka/

app:
  maintenance:
    message: "ATENCIÓN MANTENIMIENTO PROGRAMADO 22:00"

management:
  endpoints:
    web:
      exposure:
        include: "refresh, health"


server:
  port: 8080
  error:
    include-message: always
    include-stacktrace: never
