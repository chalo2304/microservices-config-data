# --- NUEVA CONFIGURACIÓN SMTP (Mailtrap) ---
spring:
  rabbitmq:
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 3000ms # Primera espera de 3 segundos
          max-attempts: 3          # Máximo 3 intentos totales
          max-interval: 10000ms   # No esperar más de 10 segundos
          multiplier: 2.0         # Backoff exponencial (3s, 6s, 10s)
  mail:
    host: sandbox.smtp.mailtrap.io
    port: 2525
    username: b59e1015031e12 # <--- Pega tu usuario aquí
    password: 066f788474c3ee # <--- Pega tu password aquí
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
